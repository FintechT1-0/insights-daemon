name: Deploy FastAPI to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Log in to DigitalOcean Container Registry
      - name: Log in to DigitalOcean Container Registry
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            ${{ secrets.DOCKER_REGISTRY }} \
            -u ${{ secrets.DOCKER_USERNAME }} \
            --password-stdin

      # 3. Build and push Docker image
      - name: Build and push Docker image
        id: build
        run: |
          IMAGE=${{ secrets.DOCKER_REGISTRY }}/fastapi-app:latest

          echo "Building image: $IMAGE"

          docker build -t "$IMAGE" .
          docker push "$IMAGE"

          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      # 4. Deploy to Droplet
      - name: Deploy to Droplet via SSH
        uses: appleboy/ssh-action@v0.1.10

        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          password: ${{ secrets.DROPLET_PASSWORD }}
          script: |
            set -e

            IMAGE="${{ steps.build.outputs.image }}"

            echo "Using image: $IMAGE"

            # Login to registry
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
              ${{ secrets.DOCKER_REGISTRY }} \
              -u ${{ secrets.DOCKER_USERNAME }} \
              --password-stdin

            # Pull latest image
            docker pull "$IMAGE"

            # Stop old container if exists
            if [ -n "$(docker ps -aq -f name=fastapi-app)" ]; then
              echo "Stopping old container..."

              docker stop fastapi-app || true
              docker rm fastapi-app || true
            fi

            # Remove dangling images (optional cleanup)
            docker image prune -f

            echo "Starting new container..."

            docker run -d \
              --name fastapi-app \
              --restart unless-stopped \
              -p 80:8000 \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e SECRET_KEY="${{ secrets.SECRET_KEY }}" \
              -e ALGORITHM="${{ secrets.ALGORITHM }}" \
              -e ACCESS_TOKEN_EXPIRE_MINUTES="${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}" \
              -e CORS_DEBUG_MODE="${{ secrets.CORS_DEBUG_MODE }}" \
              -e TRUSTED_ORIGIN="${{ secrets.TRUSTED_ORIGIN }}" \
              -e ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}" \
              -e DB_CONNECTION_LIMIT="${{ secrets.DB_CONNECTION_LIMIT }}" \
              -e EMAIL_PROVIDER_API_KEY="${{ secrets.EMAIL_PROVIDER_API_KEY }}" \
              -e EMAIL_PROVIDER_ENDPOINT="${{ secrets.EMAIL_PROVIDER_ENDPOINT }}" \
              -e EMAIL="${{ secrets.EMAIL }}" \
              -e FRONTEND_URL="${{ secrets.FRONTEND_URL }}" \
              -e BACKEND_URL="${{ secrets.BACKEND_URL }}" \
              -e AI_PROVIDER_API_KEY="${{ secrets.AI_PROVIDER_API_KEY }}" \
              -e AI_PROVIDER_MODEL_NAME="${{ secrets.AI_PROVIDER_MODEL_NAME }}" \
              "$IMAGE"

            echo "Deployment completed successfully."

            # Show running containers
            docker ps
